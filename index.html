<!DOCTYPE html>
<html>
<head>
  <base href="/BytSpot/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="BytSpot - Your fully functional web app.">
  <meta name="google-signin-client_id" content="139410303233-knd9qh4d9eqlrflk81pdpg996f27aosj.apps.googleusercontent.com">
 
  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BytSpot">
  <link rel="apple-touch-icon" href="icons/logo_dark.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/logo_dark.png"/>

  <title>BytSpot</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #FFFFFF; /* Revert to white to match splash screen */
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #loading-indicator {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #FFFFFF;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.8s ease-in-out;
    }
    .logo-container {
      margin-bottom: 40px;
      animation: zoomIn 1s cubic-bezier(0.2, 0, 0.2, 1);
    }
    .logo {
      width: 240px;
      height: 240px;
      object-fit: contain;
    }
    .loader-wrapper {
      width: 350px;
      height: 6px;
      background-color: #F0F0F0;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 30px;
    }
    .loader-bar {
      width: 0%;
      height: 100%;
      background-color: #FF0000;
      border-radius: 3px;
      animation: progress 3s ease-in-out infinite;
    }
    .brand-name {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 42px;
      font-weight: 800;
      color: #FF0000;
      letter-spacing: 2px;
      margin-top: 15px;
    }
    @keyframes progress {
      0% { width: 0%; margin-left: 0%; }
      50% { width: 70%; margin-left: 15%; }
      100% { width: 0%; margin-left: 100%; }
    }
    @keyframes zoomIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="loading-indicator">
    <div class="logo-container">
      <img src="icons/logo_dark.png" alt="BytSpot Logo" class="logo">
    </div>
    <div class="brand-name">BytSpot</div>
    <div class="loader-wrapper">
      <div class="loader-bar"></div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  
  <script>
    function hideLoadingIndicator() {
      var loadingIndicator = document.getElementById('loading-indicator');
      if (loadingIndicator && loadingIndicator.style.display !== 'none') {
        loadingIndicator.style.opacity = '0';
        setTimeout(function() {
          loadingIndicator.style.display = 'none';
        }, 800);
      }
    }

    // Fallback if Flutter fails after 10 seconds
    window.addEventListener('load', function(ev) {
      setTimeout(function() {
        hideLoadingIndicator();
      }, 10000);
    });
  </script>
</body>
</html>
