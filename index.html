<!DOCTYPE html>
<html>
<head>
  <base href="/BytSpot/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="BytSpot - Your fully functional web app.">
 
  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BytSpot">
  <link rel="apple-touch-icon" href="icons/logo_dark.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/logo_dark.png"/>

  <title>BytSpot</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #000000;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #loading-indicator {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #FF0000 0%, #660000 70%, #000000 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .logo-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 40px;
    }
    .logo {
      width: 180px;
      height: 180px;
      z-index: 2;
      filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.25));
      animation: float 3.5s infinite ease-in-out;
    }
    .logo-glow {
      position: absolute;
      width: 240px;
      height: 240px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 1;
      animation: pulse-glow 3.5s infinite ease-in-out;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-left-color: #FFFFFF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes pulse-glow {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.2); opacity: 0.6; }
    }
    .loading-text {
      color: #FFFFFF;
      margin-top: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.8;
      animation: fade-in-out 2s infinite ease-in-out;
    }
    @keyframes fade-in-out {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }
  </style>
</head>
<body>
  <div id="loading-indicator">
    <div class="logo-container">
      <div class="logo-glow"></div>
      <img src="icons/logo_dark.png" alt="BytSpot Logo" class="logo">
    </div>
    <div class="spinner"></div>
    <div class="loading-text">BytSpot</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  
  <script>
    window.addEventListener('load', function(ev) {
      var loadingIndicator = document.getElementById('loading-indicator');
      // Hide the loading indicator after a delay to ensure smooth transition
      setTimeout(function() {
        if (loadingIndicator) {
          loadingIndicator.style.opacity = '0';
          setTimeout(function() {
            loadingIndicator.style.display = 'none';
          }, 800);
        }
      }, 4000);
    });
  </script>
</body>
</html>
